name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yml'
      - '.tsuku-recipes/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yml'
      - '.tsuku-recipes/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Verify shell-init output
        run: |
          go build -o niwa-test ./cmd/niwa
          for shell in bash zsh; do
            output=$(./niwa-test shell-init "$shell")
            if [ -z "$output" ]; then
              echo "::error::niwa shell-init $shell produced empty output"
              exit 1
            fi
            if ! echo "$output" | grep -q 'niwa()'; then
              echo "::error::niwa shell-init $shell missing wrapper function"
              exit 1
            fi
          done
          rm niwa-test
