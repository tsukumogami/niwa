name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'test/functional/**'
      - '.github/workflows/test.yml'
      - '.tsuku-recipes/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'test/functional/**'
      - '.github/workflows/test.yml'
      - '.tsuku-recipes/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Functional tests
        run: make test-functional

      - name: Install Infisical CLI
        if: env.INFISICAL_CLIENT_ID != ''
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}

      - name: Vault integration tests
        if: env.INFISICAL_CLIENT_ID != ''
        run: |
          # Authenticate as machine identity; the --plain flag prints the JWT
          INFISICAL_TOKEN=$(infisical login \
            --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" \
            --client-secret="$INFISICAL_CLIENT_SECRET" \
            --silent --plain)
          export INFISICAL_TOKEN

          go test -v -count=1 -run TestIntegration ./internal/vault/infisical/
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_TEST_PROJECT_ID: ${{ secrets.INFISICAL_TEST_PROJECT_ID }}

      - name: Install tsuku
        run: curl -fsSL https://tsuku.dev/install.sh | bash

      - name: Verify shell-init output
        run: |
          go build -o niwa-test ./cmd/niwa
          for shell in bash zsh; do
            output=$(./niwa-test shell-init "$shell")
            if [ -z "$output" ]; then
              echo "::error::niwa shell-init $shell produced empty output"
              exit 1
            fi
            if ! echo "$output" | grep -q 'niwa()'; then
              echo "::error::niwa shell-init $shell missing wrapper function"
              exit 1
            fi
            if ! echo "$output" | grep -q '__complete'; then
              echo "::error::niwa shell-init $shell missing cobra completion dispatch"
              exit 1
            fi
            echo "OK: shell-init $shell produces valid wrapper + completion output"
          done
          rm niwa-test

      - name: Verify recipe installs via tsuku
        run: |
          export PATH="$HOME/.tsuku/bin:$PATH"
          eval "$(tsuku shellenv)"
          tsuku install tsukumogami/niwa:niwa --force

          # Verify shell.d init files if install_shell_init ran.
          # The distributed source fetches the recipe from main. Once the
          # install_shell_init step is on main, this validates the full
          # lifecycle. Until then it validates recipe parsing and install.
          # Full e2e blocked by tsukumogami/tsuku#2218 (--recipe skips
          # post-install phase).
          for shell in bash zsh; do
            init_file="$HOME/.tsuku/share/shell.d/niwa.$shell"
            if [ -f "$init_file" ]; then
              if ! grep -q 'niwa()' "$init_file"; then
                echo "::error::$init_file missing niwa() wrapper function"
                exit 1
              fi
              if ! grep -q '__complete' "$init_file"; then
                echo "::error::$init_file missing cobra completion dispatch"
                exit 1
              fi
              echo "OK: $init_file contains wrapper + completion dispatch"
            fi
          done

          tsuku remove niwa
          for shell in bash zsh; do
            init_file="$HOME/.tsuku/share/shell.d/niwa.$shell"
            if [ -f "$init_file" ]; then
              echo "::error::$init_file was not cleaned up by tsuku remove"
              exit 1
            fi
          done
          echo "OK: tsuku install/remove cycle completed successfully"
