name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.2.0)"
        required: true
        type: string
      tag:
        description: "Git tag (e.g., v0.2.0)"
        required: true
        type: string
      ref:
        description: "Branch or commit to release from"
        required: true
        type: string
        default: main

jobs:
  release:
    uses: tsukumogami/shirabe/.github/workflows/release.yml@v0.2.0
    with:
      version: ${{ inputs.version }}
      tag: ${{ inputs.tag }}
      ref: ${{ inputs.ref }}
